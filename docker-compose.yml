name: cecar-marketplace

services:
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        VITE_GATEWAY_BASE_URL: ${VITE_GATEWAY_BASE_URL:-https://cecarhub.com/api/v1}
    ports:
      - "127.0.0.1:8088:80"
    environment:
      - VITE_GATEWAY_BASE_URL=${VITE_GATEWAY_BASE_URL:-https://cecarhub.com/api/v1}
    depends_on:
      - gateway
    networks:
      - marketplace
    restart: unless-stopped

  identity:
    build:
      context: ./apps/identity-service
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - DATABASE_URL=${IDENTITY_DATABASE_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    networks:
      - marketplace
    restart: unless-stopped

  gateway:
    build:
      context: ./apps/gateway-service
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - identity-service.url=http://identity:3000
      - catalog-service.url=http://catalog:8081
      - media-service.url=http://media:3001
      - frontend.url=${FRONTEND_URL:-https://cecarhub.com}
    depends_on:
      - identity
      - catalog
      - media
    networks:
      - marketplace
    restart: unless-stopped

  catalog:
    build:
      context: ./apps/catalog-service
      dockerfile: Dockerfile
    expose:
      - "8081"
    environment:
      - SPRING_DATASOURCE_URL=${CATALOG_DATABASE_URL}
      - SPRING_DATASOURCE_USERNAME=${CATALOG_DATABASE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${CATALOG_DATABASE_PASSWORD}
    networks:
      - marketplace
    restart: unless-stopped

  media:
    build:
      context: ./apps/media-service
      dockerfile: Dockerfile
    expose:
      - "3001"
    environment:
      - UPLOADTHING_TOKEN=${UPLOADTHING_TOKEN}
    networks:
      - marketplace
    restart: unless-stopped

networks:
  marketplace:
    driver: bridge