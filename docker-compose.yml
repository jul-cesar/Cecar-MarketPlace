name: cecar-marketplace

services:
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        VITE_GATEWAY_BASE_URL: ${VITE_GATEWAY_BASE_URL:-https://cecarhub.com}
        VITE_MESSAGING_BASE_URL: ${VITE_MESSAGING_BASE_URL:-https://cecarhub.com}
        VITE_MESSAGING_API_PREFIX: ${VITE_MESSAGING_API_PREFIX:-/api/v1/messaging}
        VITE_MESSAGING_SOCKET_URL: ${VITE_MESSAGING_SOCKET_URL:-https://cecarhub.com}
        VITE_MESSAGING_SOCKET_PATH: ${VITE_MESSAGING_SOCKET_PATH:-/socket.io}
    ports:
      - "127.0.0.1:8088:80"
    environment:
      - VITE_GATEWAY_BASE_URL=${VITE_GATEWAY_BASE_URL:-https://cecarhub.com}
    depends_on:
      - gateway
      - messaging
    networks:
      - marketplace
    restart: unless-stopped

  identity:
    build:
      context: ./apps/identity-service
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - DATABASE_URL=${IDENTITY_DATABASE_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    networks:
      - marketplace
    restart: unless-stopped

  gateway:
    build:
      context: ./apps/gateway-service
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - identity-service.url=http://identity:3000
      - catalog-service.url=http://catalog:8081
      - media-service.url=http://media:3001
      - messaging-service.url=http://messaging:3002
      - admin-service.url=http://admin:8082
      - frontend.url=${FRONTEND_URL:-https://cecarhub.com}
    depends_on:
      - identity
      - catalog
      - media
      - messaging
      - admin
    networks:
      - marketplace
    restart: unless-stopped

  catalog:
    build:
      context: ./apps/catalog-service
      dockerfile: Dockerfile
    expose:
      - "8081"
    environment:
      - SPRING_DATASOURCE_URL=${CATALOG_DATABASE_URL}
      - SPRING_DATASOURCE_USERNAME=${CATALOG_DATABASE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${CATALOG_DATABASE_PASSWORD}
    networks:
      - marketplace
    restart: unless-stopped

  media:
    build:
      context: ./apps/media-service
      dockerfile: Dockerfile
    expose:
      - "3001"
    environment:
      - UPLOADTHING_TOKEN=${UPLOADTHING_TOKEN}
    networks:
      - marketplace
    restart: unless-stopped

  messaging:
    build:
      context: ./apps/messaging-service
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3002
      - DATABASE_URL=${MESSAGING_DATABASE_URL}
      - IDENTITY_SERVICE_URL=http://identity:3000
      - CATALOG_SERVICE_URL=http://catalog:8081
      - FRONTEND_URL=${FRONTEND_URL:-https://cecarhub.com}
      - ENABLE_SERVICE_CORS=false
    depends_on:
      - identity
      - catalog
    networks:
      - marketplace
    restart: unless-stopped

  admin:
    build:
      context: ./apps/admin-service
      dockerfile: Dockerfile
    expose:
      - "8082"
    environment:
      - SPRING_DATASOURCE_URL=${IDENTITY_DATABASE_URL_JDBC:-jdbc:postgresql://localhost:5432/identity}
      - SPRING_DATASOURCE_USERNAME=${IDENTITY_DATABASE_USERNAME:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${IDENTITY_DATABASE_PASSWORD:-postgres}
      - CATALOG_SERVICE_URL=http://catalog:8081
    depends_on:
      - identity
      - catalog
    networks:
      - marketplace
    restart: unless-stopped

networks:
  marketplace:
    driver: bridge
